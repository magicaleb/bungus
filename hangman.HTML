<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hangman">
    <meta name="theme-color" content="#1a1a2e">
    <title>Hangman</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --accent: #e94560;
            --accent-dim: #c73652;
            --text: #eaeaea;
            --text-dim: #8892a4;
            --correct: #4caf50;
            --wrong: #e94560;
            --key-bg: #0f3460;
            --key-hover: #1a4a7a;
            --key-disabled: #2a2a3e;
            --gallows: #eaeaea;
            --radius: 10px;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        #score {
            display: flex;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        #score strong {
            color: var(--text);
        }

        main {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        #gallows-section {
            flex: 0 0 auto;
        }

        #gallows {
            width: 160px;
            height: 176px;
        }

        .gallows-line {
            stroke: var(--gallows);
            stroke-width: 3;
            stroke-linecap: round;
        }

        .body-part {
            stroke: var(--accent);
            stroke-width: 4;
            stroke-linecap: round;
            fill: none;
            transition: opacity 0.3s ease;
        }

        circle.body-part {
            fill: none;
        }

        .body-part.hidden {
            opacity: 0;
        }

        #word-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .hint {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 1.2em;
        }

        #word-display {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .letter-slot {
            width: 28px;
            height: 38px;
            border-bottom: 3px solid var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: color 0.2s, border-color 0.2s;
        }

        .letter-slot.revealed {
            color: var(--correct);
            border-color: var(--correct);
        }

        .letter-slot.space {
            border-bottom: none;
            width: 14px;
        }

        #wrong-letters {
            font-size: 0.9rem;
            color: var(--wrong);
            min-height: 1.4em;
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }

        #wrong-letters .label {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #wrong-list {
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #keyboard-section {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow);
        }

        #keyboard {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .key {
            width: 38px;
            height: 38px;
            background: var(--key-bg);
            color: var(--text);
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, opacity 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .key:hover:not(:disabled) {
            background: var(--key-hover);
            transform: translateY(-2px);
        }

        .key:active:not(:disabled) {
            transform: translateY(0);
        }

        .key:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .key.correct {
            background: var(--correct);
            opacity: 1;
        }

        .key.wrong {
            background: var(--wrong);
            opacity: 0.45;
        }

        #message-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        #message-overlay.hidden {
            display: none;
        }

        #message-box {
            background: var(--surface);
            border-radius: 16px;
            padding: 36px 40px;
            text-align: center;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 320px;
            width: 90%;
        }

        #message-title {
            font-size: 2rem;
            font-weight: 800;
        }

        #message-word {
            font-size: 1rem;
            color: var(--text-dim);
            word-break: break-all;
        }

        #message-word span {
            color: var(--text);
            font-weight: 600;
            text-transform: uppercase;
        }

        #play-again-btn {
            margin-top: 8px;
            padding: 12px 28px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            letter-spacing: 1px;
        }

        #play-again-btn:hover {
            background: var(--accent-dim);
            transform: translateY(-2px);
        }

        #play-again-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 420px) {
            main {
                flex-direction: column;
                align-items: center;
            }

            #gallows {
                width: 130px;
                height: 143px;
            }

            #word-section {
                width: 100%;
                align-items: center;
            }

            #word-display {
                justify-content: center;
            }

            #wrong-letters {
                justify-content: center;
            }

            .key {
                width: 34px;
                height: 34px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>Hangman</h1>
            <div id="score">
                <span>Wins: <strong id="wins">0</strong></span>
                <span>Losses: <strong id="losses">0</strong></span>
            </div>
        </header>

        <main>
            <section id="gallows-section" aria-label="Hangman figure">
                <svg id="gallows" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
                    <!-- Gallows structure (always visible) -->
                    <line x1="20" y1="210" x2="180" y2="210" class="gallows-line"/>
                    <line x1="60" y1="210" x2="60" y2="20"  class="gallows-line"/>
                    <line x1="60" y1="20"  x2="130" y2="20" class="gallows-line"/>
                    <line x1="130" y1="20" x2="130" y2="45" class="gallows-line"/>
                    <!-- Body parts (shown on wrong guesses) -->
                    <circle id="head"    cx="130" cy="60"  r="15"         class="body-part hidden"/>
                    <line   id="body"    x1="130" y1="75"  x2="130" y2="140" class="body-part hidden"/>
                    <line   id="arm-l"   x1="130" y1="90"  x2="100" y2="120" class="body-part hidden"/>
                    <line   id="arm-r"   x1="130" y1="90"  x2="160" y2="120" class="body-part hidden"/>
                    <line   id="leg-l"   x1="130" y1="140" x2="100" y2="175" class="body-part hidden"/>
                    <line   id="leg-r"   x1="130" y1="140" x2="160" y2="175" class="body-part hidden"/>
                </svg>
            </section>

            <section id="word-section" aria-label="Word to guess">
                <div id="hint" class="hint"></div>
                <div id="word-display" aria-live="polite"></div>
                <div id="wrong-letters" aria-live="polite">
                    <span class="label">Wrong:</span>
                    <span id="wrong-list"></span>
                </div>
            </section>
        </main>

        <section id="keyboard-section" aria-label="Letter keyboard">
            <div id="keyboard"></div>
        </section>

        <div id="message-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="message-title">
            <div id="message-box">
                <p id="message-title"></p>
                <p id="message-word"></p>
                <button id="play-again-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        const WORDS = [
            { word: 'javascript', hint: 'Programming Language' },
            { word: 'algorithm',  hint: 'Computer Science' },
            { word: 'keyboard',   hint: 'Computer Hardware' },
            { word: 'elephant',   hint: 'Animal' },
            { word: 'mountain',   hint: 'Geography' },
            { word: 'library',    hint: 'Place / Programming' },
            { word: 'python',     hint: 'Programming Language' },
            { word: 'umbrella',   hint: 'Everyday Object' },
            { word: 'chocolate',  hint: 'Food' },
            { word: 'telescope',  hint: 'Science' },
            { word: 'penguin',    hint: 'Animal' },
            { word: 'notebook',   hint: 'Everyday Object' },
            { word: 'developer',  hint: 'Profession' },
            { word: 'browser',    hint: 'Technology' },
            { word: 'function',   hint: 'Programming' },
            { word: 'variable',   hint: 'Programming' },
            { word: 'database',   hint: 'Technology' },
            { word: 'interface',  hint: 'Programming' },
            { word: 'network',    hint: 'Technology' },
            { word: 'hospital',   hint: 'Place' },
            { word: 'furniture',  hint: 'Home' },
            { word: 'sandwich',   hint: 'Food' },
            { word: 'sunshine',   hint: 'Weather' },
            { word: 'waterfall',  hint: 'Nature' },
            { word: 'dinosaur',   hint: 'Animal' },
            { word: 'calendar',   hint: 'Everyday Object' },
            { word: 'computer',   hint: 'Technology' },
            { word: 'universe',   hint: 'Science' },
            { word: 'adventure',  hint: 'Concept' },
        ];

        const MAX_WRONG = 6;

        const BODY_PART_IDS = ['head', 'body', 'arm-l', 'arm-r', 'leg-l', 'leg-r'];

        const state = {
            word: '',
            hint: '',
            guessed: new Set(),
            wrongCount: 0,
            wins: 0,
            losses: 0,
            gameOver: false,
        };

        const wordDisplay  = document.getElementById('word-display');
        const wrongList    = document.getElementById('wrong-list');
        const hintEl       = document.getElementById('hint');
        const keyboard     = document.getElementById('keyboard');
        const overlay      = document.getElementById('message-overlay');
        const messageTitle = document.getElementById('message-title');
        const messageWord  = document.getElementById('message-word');
        const playAgainBtn = document.getElementById('play-again-btn');
        const winsEl       = document.getElementById('wins');
        const lossesEl     = document.getElementById('losses');

        function pickWord() {
            return WORDS[Math.floor(Math.random() * WORDS.length)];
        }

        function initGame() {
            const entry = pickWord();
            state.word       = entry.word.toLowerCase();
            state.hint       = entry.hint;
            state.guessed    = new Set();
            state.wrongCount = 0;
            state.gameOver   = false;

            overlay.classList.add('hidden');
            renderGallows();
            renderWord();
            renderWrong();
            renderKeyboard();
            hintEl.textContent = `Hint: ${state.hint}`;
            updateScore();
        }

        function renderGallows() {
            BODY_PART_IDS.forEach((id, i) => {
                const el = document.getElementById(id);
                el.classList.toggle('hidden', i >= state.wrongCount);
            });
        }

        function renderWord() {
            wordDisplay.innerHTML = '';
            for (const ch of state.word) {
                const slot = document.createElement('div');
                if (ch === ' ') {
                    slot.className = 'letter-slot space';
                } else {
                    slot.className = 'letter-slot';
                    if (state.guessed.has(ch)) {
                        slot.textContent = ch;
                        slot.classList.add('revealed');
                    }
                }
                wordDisplay.appendChild(slot);
            }
        }

        function renderWrong() {
            const wrong = [...state.guessed].filter(ch => !state.word.includes(ch));
            wrongList.textContent = wrong.join(' ') || '';
        }

        function renderKeyboard() {
            keyboard.innerHTML = '';
            for (let i = 0; i < 26; i++) {
                const ch = String.fromCharCode(97 + i);
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.textContent = ch;
                btn.setAttribute('aria-label', `Guess letter ${ch}`);
                btn.dataset.letter = ch;

                if (state.guessed.has(ch)) {
                    btn.disabled = true;
                    btn.classList.add(state.word.includes(ch) ? 'correct' : 'wrong');
                }

                btn.addEventListener('click', () => guess(ch));
                keyboard.appendChild(btn);
            }
        }

        function updateKeyButton(ch) {
            const btn = keyboard.querySelector(`[data-letter="${ch}"]`);
            if (!btn) return;
            btn.disabled = true;
            btn.classList.add(state.word.includes(ch) ? 'correct' : 'wrong');
        }

        function guess(ch) {
            if (state.gameOver || state.guessed.has(ch)) return;

            state.guessed.add(ch);

            if (!state.word.includes(ch)) {
                state.wrongCount++;
            }

            renderGallows();
            renderWord();
            renderWrong();
            updateKeyButton(ch);
            checkEndCondition();
        }

        function isWordComplete() {
            return [...state.word].every(ch => ch === ' ' || state.guessed.has(ch));
        }

        function checkEndCondition() {
            if (isWordComplete()) {
                state.wins++;
                endGame(true);
            } else if (state.wrongCount >= MAX_WRONG) {
                state.losses++;
                endGame(false);
            }
        }

        function endGame(won) {
            state.gameOver = true;
            updateScore();

            messageTitle.textContent = won ? '🎉 You Won!' : '💀 Game Over';
            messageTitle.style.color = won ? 'var(--correct)' : 'var(--wrong)';
            messageWord.innerHTML = `The word was: <span>${state.word}</span>`;
            overlay.classList.remove('hidden');
            playAgainBtn.focus();
        }

        function updateScore() {
            winsEl.textContent   = state.wins;
            lossesEl.textContent = state.losses;
        }

        document.addEventListener('keydown', (e) => {
            if (state.gameOver) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    initGame();
                }
                return;
            }
            const ch = e.key.toLowerCase();
            if (/^[a-z]$/.test(ch)) {
                guess(ch);
            }
        });

        playAgainBtn.addEventListener('click', initGame);

        initGame();
    </script>
</body>
</html>
